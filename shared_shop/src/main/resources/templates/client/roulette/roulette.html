<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title>ログインルーレット | シェアードショップ</title>
<meta charset="UTF-8" />
</head>
<body class="user">
	<style>
	.roulette-container {
		text-align: center;
		padding: 50px;
	}
	.wheel-wrapper {
		position: relative;
		width: 320px;
		height: 320px;
		margin: 20px auto;
	}
	.roulette-wheel {
		width: 300px;
		height: 300px;
		border: 10px solid #333;
		border-radius: 50%;
		background: conic-gradient(
			#ff6b6b 0% 1%,
			#feca57 1% 5%,
			#48dbfb 5% 20%,
			#1dd1a1 20% 50%,
			#ccc 50% 100%
		);
		transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
	}
	.pointer {
		position: absolute;
		top: -20px;
		left: 50%;
		transform: translateX(-50%);
		width: 0;
		height: 0;
		border-left: 15px solid transparent;
		border-right: 15px solid transparent;
		border-top: 30px solid #333;
		z-index: 10;
	}
	.button-area {
		margin-top: 30px;
	}
	.button:disabled {
		background-color: #ccc;
		cursor: not-allowed;
	}
	</style>

	<div class="roulette-container">
		<h2 class="title">1日1回限定！ログインルーレット</h2>
		<p>ログインありがとうございます！クーポンが当たるルーレットに挑戦しましょう。</p>

		<div class="wheel-wrapper">
			<div class="pointer"></div>
			<div class="roulette-wheel" id="wheel"></div>
		</div>

		<div class="button-area">
			<form th:action="@{/client/roulette/run}" method="post" id="rouletteForm">
				<input type="button" value="ルーレットを回す！" class="button" id="spinButton" onclick="spinWheel()" />
			</form>
		</div>
	</div>

	<script th:inline="javascript">
		async function spinWheel() {
			const wheel = document.getElementById('wheel');
			const button = document.getElementById('spinButton');
			const form = document.getElementById('rouletteForm');

			// ボタンを無効化
			button.disabled = true;
			button.value = '抽選中...';

			try {
				// フォームデータを非同期で送信
				const formData = new FormData(form);
				const response = await fetch(form.action, {
					method: form.method,
					body: formData
				});

				// リダイレクトされた場合（二重実行防止やログイン画面）
				if (response.redirected) {
					window.location.href = response.url;
					return;
				}

				const htmlText = await response.text();

				// 結果ページから割引率を抽出
				const parser = new DOMParser();
				const doc = parser.parseFromString(htmlText, 'text/html');
				const badgeSpan = doc.querySelector('.discount-badge span');

				if (!badgeSpan) {
					// 割引率が見つからない場合はそのまま画面遷移
					document.open();
					document.write(htmlText);
					document.close();
					return;
				}

				const discountRate = parseInt(badgeSpan.textContent, 10);
				let minDeg, maxDeg;

				// 割引率に応じた角度の範囲を設定
				// conic-gradient の設定に対応:
				// 50%: 0-1% (0 - 3.6度)
				// 30%: 1-5% (3.6 - 18度)
				// 20%: 5-20% (18 - 72度)
				// 10%: 20-50% (72 - 180度)
				// 5%: 50-100% (180 - 360度)
				switch (discountRate) {
					case 50:
						minDeg = 0; maxDeg = 3.6; break;
					case 30:
						minDeg = 3.6; maxDeg = 18; break;
					case 20:
						minDeg = 18; maxDeg = 72; break;
					case 10:
						minDeg = 72; maxDeg = 180; break;
					case 5:
					default:
						minDeg = 180; maxDeg = 360; break;
				}

				// 指定範囲内でランダムな角度を決定（境界を少し避ける）
				const padding = (maxDeg - minDeg) * 0.1;
				const targetAngle = minDeg + padding + Math.random() * (maxDeg - minDeg - 2 * padding);

				// 針が上部（0度）にあるため、ターゲットの角度を針に合わせるには 360 - targetAngle 回転させる
				const stoppingAngle = 360 - targetAngle;

				// 最低5回転 (1800度) + 停止角度
				const totalDegree = 1800 + stoppingAngle;

				// アニメーション実行
				wheel.style.transform = `rotate(${totalDegree}deg)`;

				// アニメーション終了後に結果画面へ遷移（DOMとURLを更新）
				setTimeout(() => {
					document.open();
					document.write(htmlText);
					document.close();
					// history.pushState を行うと POST エンドポイントに GET でリロードされてしまうため、
					// ブラウザのリロード対策として URL はそのまま (/client/roulette) にしておくか、リダイレクトするなどの対応が必要だが、
					// 既存の動きに影響を与えないために pushState は削除します。
				}, 4500);

			} catch (error) {
				console.error('Error during roulette spin:', error);
				// すでに fetch が成功して結果が確定している可能性があるため、
				// フォームの再送信ではなく、単にアラートなどでエラーを通知する
				alert("エラーが発生しました。トップページに戻ります。");
				window.location.href = "/shared_shop/";
			}
		}
	</script>
</body>
</html>
