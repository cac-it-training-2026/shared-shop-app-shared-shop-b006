<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">
<head>
<title>ログインルーレット | シェアードショップ</title>
<meta charset="UTF-8" />
<style>
.roulette-container {
	text-align: center;
	padding: 50px;
}
.roulette-wheel {
	width: 300px;
	height: 300px;
	border: 10px solid #333;
	border-radius: 50%;
	margin: 20px auto;
	background: conic-gradient(
		#ff6b6b 0% 1%,
		#feca57 1% 5%,
		#48dbfb 5% 20%,
		#1dd1a1 20% 50%,
		#ccc 50% 100%
	);
	transition: transform 3s ease-out;
}
</style>
</head>
<body class="user">
	<div class="roulette-container">
		<h2 class="title">1日1回限定！ログインルーレット</h2>
		<p>ログインありがとうございます！クーポンが当たるルーレットに挑戦しましょう。</p>

		<div class="roulette-wheel" id="wheel"></div>

		<form th:action="@{/client/roulette/run}" method="post">
			<input type="submit" value="ルーレットを回す！" class="button" />
		</form>
	</div>
</body>
</html>
